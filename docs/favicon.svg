<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <rect x="1" y="1" width="62" height="62" rx="14" fill="#0b0e13" stroke="#2d3848" stroke-width="1.5"/>
  <!-- isometric zone box: top face lightest, left mid, right darkest -->
  <g stroke-linejoin="round">
    <polygon points="32,31 50,40 32,49 14,40" fill="#5d8ce0" fill-opacity="0.30"/>
    <polygon points="14,40 32,49 32,57 14,48" fill="#34538c" fill-opacity="0.55"/>
    <polygon points="50,40 32,49 32,57 50,48" fill="#22386a" fill-opacity="0.6"/>
    <polygon points="32,31 50,40 32,49 14,40 32,31" fill="none" stroke="#86b0f2" stroke-opacity="0.85" stroke-width="1.2"/>
    <line x1="32" y1="49" x2="32" y2="57" stroke="#86b0f2" stroke-opacity="0.45" stroke-width="1"/>
    <line x1="14" y1="40" x2="14" y2="48" stroke="#86b0f2" stroke-opacity="0.3" stroke-width="1"/>
    <line x1="50" y1="40" x2="50" y2="48" stroke="#86b0f2" stroke-opacity="0.3" stroke-width="1"/>
  </g>
  <!-- system nodes rising vertically from the roof; amber apex = the selection color -->
  <g stroke="#7e8ea6" stroke-width="1.4" stroke-opacity="0.65" stroke-linecap="round">
    <line x1="24" y1="40" x2="24" y2="25"/>
    <line x1="40" y1="40" x2="40" y2="27"/>
    <line x1="32" y1="37" x2="32" y2="12"/>
  </g>
  <circle cx="24" cy="40" r="1.3" fill="#7e8ea6"/>
  <circle cx="40" cy="40" r="1.3" fill="#7e8ea6"/>
  <circle cx="32" cy="37" r="1.3" fill="#7e8ea6"/>
  <circle cx="24" cy="24" r="2.4" fill="#9fb2cc"/>
  <circle cx="40" cy="26" r="2.4" fill="#9fb2cc"/>
  <circle cx="32" cy="11" r="3.4" fill="#ffc66b"/>
</svg>
