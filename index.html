<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>BND·VIZ — EnergyPlus system explorer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans+Condensed:wght@400;500;600;700&family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>

<div id="topbar">
  <div id="wordmark">BND<em>·</em>VIZ<small>ENERGYPLUS SYSTEM EXPLORER</small></div>
  <select id="datasetPick" title="demo dataset">
    <option value="large-office">Large Office VAV</option>
    <option value="hospital">Hospital</option>
    <option value="small-office">Small Office PSZ</option>
  </select>
  <div class="chip" id="datasetChip">no dataset</div>
  <div id="metric">
    <button data-metric="system" class="on">System</button>
    <button data-metric="temperature">Temperature</button>
    <button data-metric="massFlow">Flow</button>
  </div>
  <div id="themeToggle" class="" style="display:flex;border:1px solid var(--hairline-2);border-radius:4px;overflow:hidden">
    <button data-theme="pro" class="on" style="appearance:none;border:0;background:var(--panel-2);color:var(--ink-dim);font:600 11px/1 var(--sans);letter-spacing:0.08em;padding:8px 12px;cursor:pointer">PRO</button>
    <button data-theme="mario" style="appearance:none;border:0;border-left:1px solid var(--hairline-2);background:var(--panel-2);color:var(--ink-dim);font:600 11px/1 var(--sans);letter-spacing:0.08em;padding:8px 12px;cursor:pointer">8-BIT</button>
  </div>
  <div id="spacer"></div>
  <div id="legend">
    <div class="legendItem"><span>temp</span><span class="legendBar" id="legendTempBar"></span>
      <input class="scaleIn" id="scaleTempMin" title="temp scale min (blank = auto)"> –
      <input class="scaleIn" id="scaleTempMax" title="temp scale max (blank = auto)"> °C</div>
    <div class="legendItem"><span>flow</span><span class="legendBar" id="legendFlowBar"></span>
      0 – <input class="scaleIn" id="scaleFlowMax" title="flow scale max (blank = auto)"> kg/s</div>
    <select id="rampPick" title="temperature colorscale">
      <option value="thermal">thermal</option>
      <option value="coolwarm">coolwarm</option>
      <option value="viridis">viridis</option>
      <option value="inferno">inferno</option>
    </select>
  </div>
</div>

<div id="workspace">
  <div id="systems">
    <div id="systemsHead" class="paneHead">
      <span class="paneTitle">SYSTEMS</span>
      <div class="tools">
        <button class="toolBtn paneToggle" data-target="systems">—</button>
      </div>
    </div>
    <div id="systemsBody">
      <div class="sysLegend">☑ expanded · ☐ collapsed to unit</div>
      <div id="systemsTree"><span class="empty">no dataset</span></div>
    </div>
  </div>
  <div class="splitter" id="splitSystems"></div>
  <div id="panes">
    <div class="pane" id="graphPane">
      <div class="paneHead">
        <span class="paneTitle">SYSTEM GRAPH</span>
        <span id="loadStatus"></span>
        <div class="tools">
          <select id="loopFilter" title="loop filter"><option value="">all loops</option></select>
          <select id="layoutMode" title="layout">
            <option value="system">system flow</option>
            <option value="organic">organic</option>
            <option value="units">unit overview</option>
          </select>
          <button class="toolBtn" id="collapseAll" title="collapse every unit (AHUs, plant sides, distribution, zone equipment)">⊟ units</button>
          <button class="toolBtn" id="expandAll" title="expand every unit">⊞ units</button>
          <button class="toolBtn" id="fit">fit</button>
          <button class="toolBtn paneToggle" data-target="graphPane">—</button>
        </div>
      </div>
      <div id="cy"></div>
      <div id="graphEmpty">drop an EnergyPlus .bnd file</div>
    </div>
    <div class="splitter" id="splitPanes"></div>
    <div class="pane" id="zonePane">
      <div class="paneHead">
        <span class="paneTitle">ZONES 3D</span>
        <div class="tools">
          <button class="toolBtn" id="resetCam">reset view</button>
          <button class="toolBtn paneToggle" data-target="zonePane">—</button>
        </div>
      </div>
      <div id="zone3d"><div id="zone3dEmpty">drop an epJSON model</div></div>
    </div>
  </div>
  <div class="splitter" id="splitInspector"></div>
  <div id="inspector">
    <div id="inspectorHead" class="paneHead">
      <span class="paneTitle">INSPECTOR</span>
      <div class="tools">
        <button class="toolBtn paneToggle" data-target="inspector">—</button>
      </div>
    </div>
    <div id="inspectorBody">
      <span class="empty">Nothing selected.</span>
    </div>
  </div>
</div>

<div id="transport">
  <button id="playBtn" title="play / pause (space)">▶</button>
  <div id="readout"><span id="readoutDate">—</span><small id="readoutValue">load playback data</small></div>
  <div id="scrubWrap">
    <input type="range" id="timeSlider" min="0" max="0" value="0">
    <div id="monthRuler"></div>
  </div>
  <select id="playSpeed" title="playback speed">
    <option value="2">2 steps/s</option>
    <option value="10">10 steps/s</option>
    <option value="30" selected>30 steps/s</option>
    <option value="120">120 steps/s</option>
  </select>
</div>

<div id="dropToast">reading file…</div>
<script type="module" src="/src/app.js"></script>
</body>
</html>
